<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="referrer" content="no-referrer"><title>f95list FR — MAJ</title><link rel="icon" type="image/png" href="/favicon.png"><style>:root{--bg:#0b1220;--panel:#111827;--panel-2:#0f172a;--text:#e6edf3;--muted:#9aa4af;--border:#263244;--accent:#58a6ff;--shadow:0 14px 40px rgba(0,0,0,.35)}*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;overflow:hidden;background:linear-gradient(180deg,#07101d 0%,#0b1220 55%,#09111e 100%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}.page{padding:10px 12px 12px;height:100vh;display:flex;flex-direction:column;gap:10px}.hero,.panel{background:rgba(17,24,39,.92);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow)}.panel{display:flex;flex-direction:column;flex:1;min-height:0}.hero{padding:14px 16px;margin-bottom:0;background:linear-gradient(135deg, rgba(96,165,250,.18), rgba(17,24,39,.96) 55%, rgba(34,197,94,.08))}.hero-top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}h1{margin:0;font-size:24px}.subtitle{margin-top:6px;color:var(--muted);font-size:14px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:8px 12px;border-radius:12px;cursor:pointer;font-weight:600}.toolbar{padding:8px;border-bottom:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:minmax(240px,1.5fr) minmax(180px,.7fr) minmax(180px,.7fr);gap:8px}.toolbar input,.toolbar select{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:9px 11px}.table-scroll{overflow:auto;flex:1;min-height:0;max-height:none}table{width:100%;border-collapse:collapse;min-width:980px}th,td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;font-size:14px;vertical-align:top} tbody td:nth-child(2), thead th:nth-child(2){width:160px;white-space:nowrap}thead th{position:sticky;top:0;background:#1c2128;z-index:2;font-size:12px;text-transform:uppercase;letter-spacing:.04em}tbody tr:hover{background:rgba(255,255,255,.03)}.type-maj,.type-ajout{display:inline-flex;align-items:center;justify-content:center;padding:6px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.08);white-space:nowrap;font-weight:700;line-height:1.1}.type-maj{background:rgba(31,111,235,.2)}.type-ajout{background:rgba(210,153,34,.25)}.footer-note{color:var(--muted);font-size:12px;padding:2px 4px 0}@media (max-width:900px){.toolbar{grid-template-columns:1fr 1fr}.page{padding:14px}}@media (max-width:600px){.toolbar{grid-template-columns:1fr}}</style></head><body><div class="page"><section class="hero"><div class="hero-top"><div><h1>🕒 Historique des MAJ</h1><div class="subtitle">Lecture dédiée de l’onglet des mises à jour et ajouts de jeux.</div></div><div class="actions"><a class="btn" href="../">← Retour f95fr</a><a class="btn" href="https://docs.google.com/spreadsheets/d/1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs/edit?pli=1&gid=1651653945#gid=1651653945" target="_blank" rel="noopener">Ouvrir le tableur</a><button class="btn" id="refreshBtn" type="button">Rafraîchir</button></div></div></section><section class="panel"><div class="toolbar"><input id="searchInput" type="search" placeholder="Rechercher un jeu ou une date..."><select id="typeFilter"><option value="">Tous les types</option></select><select id="sortSelect"><option value="date-desc">Date ↓</option><option value="date-asc">Date ↑</option></select></div><div class="table-scroll"><table><thead><tr><th>Date</th><th>Type</th><th>Jeux</th></tr></thead><tbody id="tableBody"><tr><td colspan="3">Chargement...</td></tr></tbody></table></div></section><div class="footer-note" id="footerNote"></div></div><script>const SHEET_ID='1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs',GID='1651653945',CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;const state={rows:[]};function parseCSV(t){const r=[];let row=[],v='',q=false;for(let i=0;i<t.length;i++){const c=t[i],n=t[i+1];if(q){if(c==='"'&&n==='"'){v+='"';i++;}else if(c==='"'){q=false;}else v+=c;}else{if(c==='"')q=true;else if(c===','){row.push(v);v='';}else if(c==='\n'){row.push(v);r.push(row);row=[];v='';}else if(c==='\r'){}else v+=c;}}row.push(v);r.push(row);return r.filter(x=>x.some(y=>String(y||'').trim()!==''));}function nh(h){return String(h||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();}function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}function mapRows(m){const [h,...d]=m;const idx={};h.forEach((x,i)=>idx[nh(x)]=i);const p=(r,...k)=>{for(const key of k){if(idx[key]!=null)return r[idx[key]]||'';}return '';};return d.map(r=>({date:p(r,'date'),type:p(r,'type'),jeux:p(r,'jeux')})).filter(r=>r.date||r.jeux);}function fillTypes(){const vals=[...new Set(state.rows.map(r=>String(r.type||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}));const s=document.getElementById('typeFilter');const cur=s.value;s.innerHTML='<option value="">Tous les types</option>';vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});if(vals.includes(cur))s.value=cur;}function dateValue(v){const m=String(v||'').match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(!m)return 0;return new Date(`${m[3]}-${m[2]}-${m[1]}T00:00:00`).getTime();}function apply(){const q=document.getElementById('searchInput').value.trim().toLowerCase();const type=document.getElementById('typeFilter').value;const sort=document.getElementById('sortSelect').value;let rows=state.rows.filter(r=>{const hay=[r.date,r.type,r.jeux].join(' ').toLowerCase();if(q&&!hay.includes(q))return false;if(type&&r.type!==type)return false;return true;});rows.sort((a,b)=>sort==='date-asc'?dateValue(a.date)-dateValue(b.date):dateValue(b.date)-dateValue(a.date));const body=document.getElementById('tableBody');body.innerHTML=rows.length?rows.map(r=>`<tr><td>${esc(r.date)||'—'}</td><td><span class="${String(r.type).toLowerCase().includes('mise')?'type-maj':'type-ajout'}">${esc(r.type)||'—'}</span></td><td>${esc(r.jeux)||'—'}</td></tr>`).join(''):'<tr><td colspan="3">Aucun résultat.</td></tr>';document.getElementById('footerNote').textContent=`${rows.length} ligne(s) affichée(s) · Source : Google Sheets`;}async function load(){try{const res=await fetch(CSV_URL,{cache:'no-store'});if(!res.ok)throw new Error(res.status);state.rows=mapRows(parseCSV(await res.text()));fillTypes();apply();}catch(e){document.getElementById('tableBody').innerHTML='<tr><td colspan="3">Impossible de charger cet onglet.</td></tr>';}}['searchInput','typeFilter','sortSelect'].forEach(id=>document.getElementById(id).addEventListener(id==='searchInput'?'input':'change',apply));document.getElementById('refreshBtn').addEventListener('click',load);load();</script></body></html>
