<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="referrer" content="no-referrer"><title>f95list FR — Pourcentage</title><link rel="icon" type="image/png" href="/favicon.png"><style>:root{--bg:#0e1117;--panel:#161b22;--panel-2:#11161d;--text:#e6edf3;--muted:#9aa4af;--border:#30363d;--accent:#58a6ff;--shadow:0 14px 40px rgba(0,0,0,.35)}*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}.page{padding:16px 18px 24px}.hero,.panel{background:var(--panel);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow)}.hero{padding:22px;margin-bottom:18px;background:linear-gradient(180deg, rgba(88,166,255,.12), rgba(88,166,255,.03))}.hero-top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}h1{margin:0;font-size:30px}.subtitle{margin-top:10px;color:var(--muted)}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:600}.toolbar{padding:14px;border-bottom:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:minmax(220px,1.1fr) minmax(220px,1.1fr) minmax(200px,.8fr);gap:10px}.toolbar input,.toolbar select{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:11px 12px}.table-scroll{overflow:auto;max-height:calc(100vh - 250px)}table{width:100%;border-collapse:collapse;min-width:1000px}th,td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;font-size:14px;vertical-align:top}thead th{position:sticky;top:0;background:#1c2128;z-index:2;font-size:12px;text-transform:uppercase;letter-spacing:.04em}.footer-note{color:var(--muted);font-size:13px;padding:14px 4px 0}.num{text-align:right;font-variant-numeric:tabular-nums}@media (max-width:900px){.toolbar{grid-template-columns:1fr 1fr}.page{padding:14px}}@media (max-width:600px){.toolbar{grid-template-columns:1fr}}</style></head><body><div class="page"><section class="hero"><div class="hero-top"><div><h1>📊 Pourcentage par type</h1><div class="subtitle">Lecture dédiée de l’onglet des pourcentages.</div></div><div class="actions"><a class="btn" href="../">← Retour f95fr</a><a class="btn" href="https://docs.google.com/spreadsheets/d/1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs/edit?pli=1&gid=2133062551#gid=2133062551" target="_blank" rel="noopener">Ouvrir le tableur</a><button class="btn" id="refreshBtn" type="button">Rafraîchir</button></div></div></section><section class="panel"><div class="toolbar"><input id="searchInput" type="search" placeholder="Rechercher site, statut ou type..."><select id="siteFilter"><option value="">Tous les sites</option></select><select id="sortSelect"><option value="total-desc">Total ↓</option><option value="site-asc">Site A → Z</option><option value="status-asc">Statut A → Z</option></select></div><div class="table-scroll"><table><thead><tr><th>Site</th><th>Statut</th><th>À tester</th><th>Trad. auto</th><th>Trad. humaine</th><th>Trad. semi-auto</th><th>VO française</th><th>Total</th></tr></thead><tbody id="tableBody"><tr><td colspan="8">Chargement...</td></tr></tbody></table></div></section><div class="footer-note" id="footerNote"></div></div><script>const SHEET_ID='1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs',GID='2133062551',CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;const state={rows:[]};function parseCSV(t){const r=[];let row=[],v='',q=false;for(let i=0;i<t.length;i++){const c=t[i],n=t[i+1];if(q){if(c==='"'&&n==='"'){v+='"';i++;}else if(c==='"'){q=false;}else v+=c;}else{if(c==='"')q=true;else if(c===','){row.push(v);v='';}else if(c==='\n'){row.push(v);r.push(row);row=[];v='';}else if(c==='\r'){}else v+=c;}}row.push(v);r.push(row);return r.filter(x=>x.some(y=>String(y||'').trim()!==''));}function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}function percentVal(v){const n=parseFloat(String(v||'').replace('%','').replace(',','.'));return Number.isFinite(n)?n:0;}function mapRows(matrix){const rows=[];for(let i=0;i<matrix.length;i++){const r=matrix[i].map(x=>String(x||'').trim());if(!r.length)continue;const site=r[0], statut=r[1], aTester=r[2], auto=r[3], humaine=r[4], semi=r[5], vo=r[6], total=r[7];if(!site||site.toLowerCase().includes('counta')||site.toLowerCase().includes('total pour')||site.toLowerCase().includes('total général')||site.toLowerCase().includes('total general'))continue;if(!statut)continue;rows.push({site,statut,aTester,auto,humaine,semi,vo,total});}return rows;}
function fillSites(){const vals=[...new Set(state.rows.map(r=>r.site).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}));const s=document.getElementById('siteFilter');const cur=s.value;s.innerHTML='<option value="">Tous les sites</option>';vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});if(vals.includes(cur))s.value=cur;}
function apply(){const q=document.getElementById('searchInput').value.trim().toLowerCase();const site=document.getElementById('siteFilter').value;const sort=document.getElementById('sortSelect').value;let rows=state.rows.filter(r=>{const hay=[r.site,r.statut,r.aTester,r.auto,r.humaine,r.semi,r.vo,r.total].join(' ').toLowerCase();if(q&&!hay.includes(q))return false;if(site&&r.site!==site)return false;return true;});rows.sort((a,b)=>{switch(sort){case 'site-asc':return a.site.localeCompare(b.site,'fr',{sensitivity:'base'});case 'status-asc':return a.statut.localeCompare(b.statut,'fr',{sensitivity:'base'});default:return percentVal(b.total)-percentVal(a.total);}});document.getElementById('tableBody').innerHTML=rows.length?rows.map(r=>`<tr><td>${esc(r.site)}</td><td>${esc(r.statut)}</td><td class="num">${esc(r.aTester||'')}</td><td class="num">${esc(r.auto||'')}</td><td class="num">${esc(r.humaine||'')}</td><td class="num">${esc(r.semi||'')}</td><td class="num">${esc(r.vo||'')}</td><td class="num">${esc(r.total||'')}</td></tr>`).join(''):'<tr><td colspan="8">Aucun résultat.</td></tr>';document.getElementById('footerNote').textContent=`${rows.length} ligne(s) affichée(s) · Source : Google Sheets`;}
async function load(){try{const res=await fetch(CSV_URL,{cache:'no-store'});if(!res.ok)throw new Error(res.status);state.rows=mapRows(parseCSV(await res.text()));fillSites();apply();}catch(e){document.getElementById('tableBody').innerHTML='<tr><td colspan="8">Impossible de charger cet onglet.</td></tr>';}}
['searchInput','siteFilter','sortSelect'].forEach(id=>document.getElementById(id).addEventListener(id==='searchInput'?'input':'change',apply));document.getElementById('refreshBtn').addEventListener('click',load);load();</script></body></html>
