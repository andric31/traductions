<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>f95list FR — Pourcentage</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111827;
      --panel-2:#0f172a;
      --panel-3:#1f2937;
      --border:#263244;
      --text:#e5eefb;
      --muted:#9fb0c8;
      --accent:#60a5fa;
      --green:#22c55e;
      --red:#ef4444;
      --orange:#f59e0b;
      --blue:#3b82f6;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:20px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#07101d 0%,#0b1220 55%,#09111e 100%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .page{padding:18px}
    .hero,.panel,.site-card,.summary-card{background:rgba(17,24,39,.92);border:1px solid var(--border);box-shadow:var(--shadow);backdrop-filter:blur(10px)}
    .hero{border-radius:24px;padding:24px;margin-bottom:18px;background:linear-gradient(135deg, rgba(96,165,250,.18), rgba(17,24,39,.96) 55%, rgba(34,197,94,.08))}
    .hero-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
    h1{margin:0;font-size:42px;line-height:1.05}
    .subtitle{margin-top:10px;color:var(--muted);font-size:17px;max-width:900px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);background:rgba(15,23,42,.92);color:var(--text);padding:11px 15px;border-radius:14px;cursor:pointer;font-weight:700;font-size:14px;min-height:44px}
    .btn:hover{background:#162238;text-decoration:none}
    .panel{border-radius:22px;padding:14px 14px 16px;margin-bottom:18px}
    .toolbar{display:grid;grid-template-columns:minmax(220px,1.4fr) minmax(200px,.9fr) minmax(200px,.9fr);gap:10px}
    .toolbar input,.toolbar select{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:14px;padding:12px 14px;font-size:14px;outline:none}
    .toolbar input:focus,.toolbar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(96,165,250,.14)}
    .summary-grid{display:grid;grid-template-columns:repeat(7,minmax(110px,1fr));gap:10px;margin-top:14px}
    .summary-card{border-radius:16px;padding:12px 12px;min-width:0}
    .summary-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .summary-value{margin-top:6px;font-size:24px;font-weight:800;line-height:1;white-space:nowrap}
    .summary-sub{margin-top:5px;color:var(--muted);font-size:12px}
    .sites-wrap{display:grid;gap:16px}
    .site-card{border-radius:22px;overflow:hidden}
    .site-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.05);background:linear-gradient(180deg, rgba(96,165,250,.08), rgba(0,0,0,0))}
    .site-title{font-size:25px;font-weight:800}
    .site-total{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px}
    .site-total-badge{padding:8px 11px;border-radius:999px;background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.22);color:#bfdbfe}
    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:780px}
    th,td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05);text-align:left;font-size:14px;vertical-align:middle}
    th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#afc0d9;background:rgba(255,255,255,.02)}
    tr:last-child td{border-bottom:none}
    .num{text-align:right;font-variant-numeric:tabular-nums}
    .status-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;border:1px solid transparent;white-space:nowrap}
    .status-en-cours{background:rgba(59,130,246,.16);color:#bfdbfe;border-color:rgba(59,130,246,.28)}
    .status-termine{background:rgba(34,197,94,.16);color:#bbf7d0;border-color:rgba(34,197,94,.26)}
    .status-abandonne{background:rgba(239,68,68,.15);color:#fecaca;border-color:rgba(239,68,68,.24)}
    .status-other{background:rgba(245,158,11,.15);color:#fde68a;border-color:rgba(245,158,11,.24)}
    .bar-cell{min-width:220px}
    .bar-track{position:relative;height:10px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:6px}
    .bar-fill{position:absolute;inset:0 auto 0 0;border-radius:999px;background:linear-gradient(90deg,#60a5fa,#34d399)}
    .muted{color:var(--muted)}
    .empty{padding:32px 18px;color:var(--muted);text-align:center}
    .footer-note{color:var(--muted);font-size:13px;padding:2px 6px 6px}
    @media (max-width:1300px){
      .summary-grid{grid-template-columns:repeat(4,minmax(120px,1fr))}
    }
    @media (max-width:820px){
      .toolbar{grid-template-columns:1fr}
      .summary-grid{grid-template-columns:repeat(2,minmax(140px,1fr))}
      h1{font-size:34px}
    }
    @media (max-width:560px){
      .page{padding:12px}
      .summary-grid{grid-template-columns:1fr}
      h1{font-size:30px}
      .site-head{padding:16px}
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>📊 Pourcentage par type</h1>
          <div class="subtitle">Version plus propre du tableau croisé Google Sheets : regroupée par site, lisible d’un coup d’œil, avec totaux, statuts et pourcentages bien séparés.</div>
        </div>
        <div class="actions">
          <a class="btn" href="../">← Retour f95fr</a>
          <a class="btn" href="https://docs.google.com/spreadsheets/d/1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs/edit?pli=1&gid=2133062551#gid=2133062551" target="_blank" rel="noopener">Ouvrir le tableur</a>
          <button class="btn" id="refreshBtn" type="button">Rafraîchir</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Rechercher un site ou un statut..." />
        <select id="siteFilter"><option value="">Tous les sites</option></select>
        <select id="sortSelect">
          <option value="total-desc">Totaux ↓</option>
          <option value="site-asc">Sites A → Z</option>
          <option value="site-desc">Sites Z → A</option>
        </select>
      </div>
      <div class="summary-grid" id="summaryGrid">
        <div class="summary-card"><div class="summary-label">Sites</div><div class="summary-value">—</div><div class="summary-sub">chargement</div></div>
      </div>
    </section>

    <div class="sites-wrap" id="sitesWrap">
      <div class="panel empty">Chargement...</div>
    </div>

    <div class="footer-note" id="footerNote"></div>
  </div>

  <script>
    const SHEET_ID = '1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs';
    const GID = '2133062551';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

    const state = { rows: [] };

    function parseCSV(text){
      const rows=[]; let row=[], value='', inQuotes=false;
      for(let i=0;i<text.length;i++){
        const c=text[i], n=text[i+1];
        if(inQuotes){
          if(c==='"' && n==='"'){ value+='"'; i++; }
          else if(c==='"'){ inQuotes=false; }
          else value+=c;
        } else {
          if(c==='"') inQuotes=true;
          else if(c===','){ row.push(value); value=''; }
          else if(c==='\n'){ row.push(value); rows.push(row); row=[]; value=''; }
          else if(c==='\r'){}
          else value+=c;
        }
      }
      row.push(value); rows.push(row);
      return rows.filter(r=>r.some(v=>String(v||'').trim()!==''));
    }

    function esc(v){
      return String(v ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function pctToNumber(v){
      const n = parseFloat(String(v || '').replace('%','').replace(',','.'));
      return Number.isFinite(n) ? n : 0;
    }

    function formatPct(v){
      if(v === '' || v == null) return '—';
      return String(v).includes('%') ? String(v).replace('.', ',') : `${String(v).replace('.', ',')}%`;
    }

    function statusClass(status){
      const s = String(status || '').trim().toUpperCase();
      if(s === 'EN COURS') return 'status-en-cours';
      if(s === 'TERMINÉ' || s === 'TERMINE') return 'status-termine';
      if(s === 'ABANDONNÉ' || s === 'ABANDONNE') return 'status-abandonne';
      return 'status-other';
    }

    function mapRows(matrix){
      const rows = [];
      let currentSite = '';
      for(let i=0;i<matrix.length;i++){
        const r = matrix[i].map(x => String(x || '').trim());
        if(!r.length) continue;

        const rawSite = r[0];
        const statut = r[1];
        const aTester = r[2];
        const auto = r[3];
        const humaine = r[4];
        const semi = r[5];
        const vo = r[6];
        const total = r[7];

        const first = rawSite.toLowerCase();
        if(first.includes('counta') || first === 'site') continue;
        if(first.includes('total pour') || first.includes('total général') || first.includes('total general')) continue;

        if(rawSite) currentSite = rawSite;
        const site = currentSite;

        if(!site || !statut) continue;

        rows.push({ site, statut, aTester, auto, humaine, semi, vo, total });
      }
      return rows;
    }

    function fillSites(){
      const values = [...new Set(state.rows.map(r => r.site).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}));
      const select = document.getElementById('siteFilter');
      const current = select.value;
      select.innerHTML = '<option value="">Tous les sites</option>';
      values.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        select.appendChild(o);
      });
      if(values.includes(current)) select.value = current;
    }

    function buildSummary(filteredRows){
      const sites = new Set(filteredRows.map(r => r.site)).size;
      const total = filteredRows.reduce((sum, r) => sum + pctToNumber(r.total), 0);
      const aTester = filteredRows.reduce((sum, r) => sum + pctToNumber(r.aTester), 0);
      const auto = filteredRows.reduce((sum, r) => sum + pctToNumber(r.auto), 0);
      const humaine = filteredRows.reduce((sum, r) => sum + pctToNumber(r.humaine), 0);
      const semi = filteredRows.reduce((sum, r) => sum + pctToNumber(r.semi), 0);
      const vo = filteredRows.reduce((sum, r) => sum + pctToNumber(r.vo), 0);
      const grid = document.getElementById('summaryGrid');
      grid.innerHTML = `
        <div class="summary-card"><div class="summary-label">Sites affichés</div><div class="summary-value">${sites}</div><div class="summary-sub">groupes visibles</div></div>
        <div class="summary-card"><div class="summary-label">Trad. auto</div><div class="summary-value">${auto.toFixed(2).replace('.', ',')}%</div><div class="summary-sub">part automatique</div></div>
        <div class="summary-card"><div class="summary-label">Trad. humaine</div><div class="summary-value">${humaine.toFixed(2).replace('.', ',')}%</div><div class="summary-sub">part humaine</div></div>
        <div class="summary-card"><div class="summary-label">Trad. semi-auto</div><div class="summary-value">${semi.toFixed(2).replace('.', ',')}%</div><div class="summary-sub">part semi-auto</div></div>
        <div class="summary-card"><div class="summary-label">VO française</div><div class="summary-value">${vo.toFixed(2).replace('.', ',')}%</div><div class="summary-sub">part VO française</div></div>
        <div class="summary-card"><div class="summary-label">À tester</div><div class="summary-value">${aTester.toFixed(2).replace('.', ',')}%</div><div class="summary-sub">part à tester</div></div>
        <div class="summary-card"><div class="summary-label">Total cumulé</div><div class="summary-value">${total.toFixed(2).replace('.', ',')}%</div><div class="summary-sub">somme des lignes affichées</div></div>
      `;
    }

    function renderSites(filteredRows){
      const wrap = document.getElementById('sitesWrap');
      if(!filteredRows.length){
        wrap.innerHTML = '<div class="panel empty">Aucun résultat.</div>';
        return;
      }

      const grouped = new Map();
      filteredRows.forEach(r => {
        if(!grouped.has(r.site)) grouped.set(r.site, []);
        grouped.get(r.site).push(r);
      });

      const sortMode = document.getElementById('sortSelect').value;
      const groups = [...grouped.entries()].map(([site, rows]) => ({
        site,
        rows: rows.sort((a,b)=>pctToNumber(b.total)-pctToNumber(a.total)),
        total: rows.reduce((sum,r)=>sum+pctToNumber(r.total), 0)
      }));

      groups.sort((a,b)=>{
        if(sortMode === 'site-asc') return a.site.localeCompare(b.site,'fr',{sensitivity:'base'});
        if(sortMode === 'site-desc') return b.site.localeCompare(a.site,'fr',{sensitivity:'base'});
        return b.total - a.total;
      });

      wrap.innerHTML = groups.map(group => `
        <section class="site-card">
          <div class="site-head">
            <div>
              <div class="site-title">${esc(group.site)}</div>
              <div class="muted">${group.rows.length} statut(s) affiché(s)</div>
            </div>
            <div class="site-total">
              <span class="muted">Total du site</span>
              <span class="site-total-badge">${group.total.toFixed(2).replace('.', ',')}%</span>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Statut</th>
                  <th class="num">À tester</th>
                  <th class="num">Trad. auto</th>
                  <th class="num">Trad. humaine</th>
                  <th class="num">Trad. semi-auto</th>
                  <th class="num">VO française</th>
                  <th class="bar-cell">Total</th>
                </tr>
              </thead>
              <tbody>
                ${group.rows.map(r => {
                  const totalNum = Math.max(0, Math.min(100, pctToNumber(r.total)));
                  return `
                    <tr>
                      <td><span class="status-badge ${statusClass(r.statut)}">${esc(r.statut)}</span></td>
                      <td class="num">${esc(formatPct(r.aTester))}</td>
                      <td class="num">${esc(formatPct(r.auto))}</td>
                      <td class="num">${esc(formatPct(r.humaine))}</td>
                      <td class="num">${esc(formatPct(r.semi))}</td>
                      <td class="num">${esc(formatPct(r.vo))}</td>
                      <td class="bar-cell">
                        <div><strong>${esc(formatPct(r.total))}</strong></div>
                        <div class="bar-track"><div class="bar-fill" style="width:${totalNum}%"></div></div>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </section>
      `).join('');
    }

    function apply(){
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const site = document.getElementById('siteFilter').value;
      const rows = state.rows.filter(r => {
        const hay = [r.site, r.statut].join(' ').toLowerCase();
        if(q && !hay.includes(q)) return false;
        if(site && r.site !== site) return false;
        return true;
      });
      buildSummary(rows);
      renderSites(rows);
      document.getElementById('footerNote').textContent = `${rows.length} ligne(s) affichée(s) · Source : Google Sheets`;
    }

    async function load(){
      try{
        const res = await fetch(CSV_URL, { cache:'no-store' });
        if(!res.ok) throw new Error(res.status);
        const csv = await res.text();
        state.rows = mapRows(parseCSV(csv));
        fillSites();
        apply();
      }catch(err){
        document.getElementById('sitesWrap').innerHTML = '<div class="panel empty">Impossible de charger cet onglet.</div>';
        document.getElementById('summaryGrid').innerHTML = '<div class="summary-card"><div class="summary-label">Erreur</div><div class="summary-value">—</div><div class="summary-sub">chargement impossible</div></div>';
        document.getElementById('footerNote').textContent = 'Erreur de chargement · Source : Google Sheets';
      }
    }

    ['searchInput','siteFilter','sortSelect'].forEach(id => {
      document.getElementById(id).addEventListener(id === 'searchInput' ? 'input' : 'change', apply);
    });
    document.getElementById('refreshBtn').addEventListener('click', load);
    load();
  </script>
</body>
</html>
