<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer">
  <title>f95list FR</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    :root{
      --bg:#0e1117;
      --panel:#161b22;
      --panel-2:#11161d;
      --text:#e6edf3;
      --muted:#9aa4af;
      --border:#30363d;
      --accent:#58a6ff;
      --green:#238636;
      --red:#da3633;
      --orange:#d29922;
      --blue:#1f6feb;
      --shadow:0 14px 40px rgba(0,0,0,.35);
      --radius:16px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .page{width:100%;max-width:none;margin:0;padding:16px 18px 24px}
    .hero{
      background:linear-gradient(180deg, rgba(88,166,255,.12), rgba(88,166,255,.03));
      border:1px solid var(--border);
      border-radius:22px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:var(--shadow);
    }
    .hero-top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    h1{margin:0;font-size:32px;line-height:1.1}
    .subtitle{margin-top:10px;color:var(--muted);line-height:1.45}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:600}
    .btn:hover{filter:brightness(1.08)}
    .btn.primary{background:rgba(31,111,235,.18);border-color:rgba(88,166,255,.45)}

    .stats{display:grid;grid-template-columns:repeat(5, minmax(140px,1fr));gap:12px;margin-bottom:16px}
    .stat{
      background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px;min-width:0;
      display:block;color:inherit;text-decoration:none;transition:transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .stat.clickable{cursor:pointer}
    .stat.clickable:hover{transform:translateY(-1px);border-color:rgba(88,166,255,.45);background:linear-gradient(180deg, rgba(88,166,255,.08), rgba(88,166,255,.02))}
    .stat .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .stat .value{font-size:28px;font-weight:800;margin-top:6px}
    .stat .hint{font-size:12px;color:var(--muted);margin-top:6px}

    .table-wrap{background:var(--panel);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:var(--shadow)}
    .table-toolbar{padding:14px;border-bottom:1px solid rgba(255,255,255,.06);background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0))}
    .toolbar-grid{display:grid;grid-template-columns:minmax(240px,1.7fr) repeat(5,minmax(140px,1fr));gap:10px}
    .toolbar-grid input,.toolbar-grid select{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:11px 12px;font-size:14px;min-width:0}

    .table-scroll{overflow-y:auto;overflow-x:hidden;max-height:calc(100vh - 340px)}
    table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:0}
    thead th{position:sticky;top:0;z-index:2;background:#1c2128;color:#f0f6fc;text-align:left;font-size:11px;letter-spacing:.04em;text-transform:uppercase;padding:11px 8px;border-bottom:1px solid var(--border);white-space:normal;line-height:1.25;word-break:break-word}
    tbody td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top;font-size:13px;line-height:1.35;word-break:break-word;overflow-wrap:anywhere}
    tbody tr:hover{background:rgba(255,255,255,.03)}
    .site-badge,.type-badge,.status-badge,.tradtype-badge{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid rgba(255,255,255,.09);white-space:normal;text-align:center;max-width:100%}
    .site-badge{background:rgba(88,166,255,.15);color:#c6e2ff}
    .type-badge{background:rgba(35,134,54,.18);color:#baf5c4}
    .status-en-cours{background:rgba(31,111,235,.22);color:#c6e2ff}
    .status-termine{background:rgba(35,134,54,.22);color:#baf5c4}
    .status-abandonne{background:rgba(218,54,51,.22);color:#ffd2cf}
    .status-other{background:rgba(210,153,34,.18);color:#ffdf9c}
    .trad-humaine{background:rgba(35,134,54,.22);color:#baf5c4}
    .trad-auto{background:rgba(218,54,51,.22);color:#ffd2cf}
    .trad-semi{background:rgba(210,153,34,.18);color:#ffdf9c}
    .muted{color:var(--muted)}
    .empty,.error{padding:26px;text-align:center;color:var(--muted)}
    .error{color:#ffd2cf}
    .footer-note{color:var(--muted);font-size:13px;padding:14px 4px 0}
    .pill-link{display:inline-flex;align-items:center;gap:8px}

    th:nth-child(1), td:nth-child(1){width:58px}
    th:nth-child(2), td:nth-child(2){width:72px}
    th:nth-child(3), td:nth-child(3){width:240px}
    th:nth-child(4), td:nth-child(4){width:96px}
    th:nth-child(5), td:nth-child(5){width:110px}
    th:nth-child(6), td:nth-child(6){width:90px}
    th:nth-child(7), td:nth-child(7){width:110px}
    th:nth-child(8), td:nth-child(8){width:330px}
    th:nth-child(9), td:nth-child(9){width:84px}
    th:nth-child(10), td:nth-child(10){width:110px}
    th:nth-child(11), td:nth-child(11){width:110px}
    th:nth-child(12), td:nth-child(12){width:160px}

    @media (max-width:1400px){
      .toolbar-grid{grid-template-columns:minmax(220px,1.4fr) repeat(3,minmax(140px,1fr))}
      .stats{grid-template-columns:repeat(3,1fr)}
      .table-scroll{overflow-x:auto}
      table{min-width:1320px;table-layout:auto}
    }
    @media (max-width:1100px){
      .toolbar-grid{grid-template-columns:1fr 1fr}
      .stats{grid-template-columns:repeat(2,1fr)}
      .table-scroll{max-height:none;overflow-x:auto}
      table{min-width:1200px;table-layout:auto}
    }
    @media (max-width:700px){
      .page{padding:14px}
      .toolbar-grid{grid-template-columns:1fr}
      .stats{grid-template-columns:1fr}
      h1{font-size:26px}
      .table-scroll{overflow-x:auto}
      table{min-width:1100px}
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>📘 f95list FR</h1>
          <div class="subtitle">Tableau Google Sheets de la communauté française</div>
        </div>
        <div class="hero-actions">
          <a class="btn" href="/">← Accueil</a>
          <a class="btn" href="https://docs.google.com/spreadsheets/d/1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs/edit?pli=1&gid=1224125898#gid=1224125898" target="_blank" rel="noopener">Ouvrir le tableur</a>
          <a class="btn" href="./traducteurs/">Traducteurs</a>
          <a class="btn" href="./maj/">MAJ</a>
          <a class="btn" href="./pourcentage/">Pourcentage</a>
          <button class="btn primary" id="refreshBtn" type="button">Rafraîchir</button>
        </div>
      </div>
    </section>

    <section class="stats" id="stats"></section>

    <section class="table-wrap">
      <div class="table-toolbar" aria-label="Filtres">
        <div class="toolbar-grid">
          <input id="searchInput" type="search" placeholder="Rechercher un jeu, un tag, un traducteur..." autocomplete="off">
          <select id="statusFilter"><option value="">Tous les statuts</option></select>
          <select id="translatorFilter"><option value="">Tous les traducteurs</option></select>
          <select id="engineFilter"><option value="">Tous les types</option></select>
          <select id="translationTypeFilter"><option value="">Tous les types de traduction</option></select>
          <select id="sortSelect">
            <option value="title-asc">Titre A → Z</option>
            <option value="title-desc">Titre Z → A</option>
            <option value="id-desc">ID ↓</option>
            <option value="id-asc">ID ↑</option>
            <option value="translator-asc">Traducteur A → Z</option>
            <option value="status-asc">Statut A → Z</option>
          </select>
        </div>
      </div>

      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Site</th><th>Nom du jeu</th><th>Version</th><th>Trad. ver.</th><th>Lien trad</th><th>Statut</th><th>Tags</th><th>Type</th><th>Traducteur</th><th>Relecteur</th><th>Type de traduction</th>
            </tr>
          </thead>
          <tbody id="tableBody"><tr><td colspan="12" class="empty">Chargement du tableur...</td></tr></tbody>
        </table>
      </div>
    </section>

    <div class="footer-note" id="footerNote"></div>
  </div>

  <script>
    const SHEET_ID = '1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs';
    const GID = '1224125898';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
    const SHEET_PAGE_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?gid=${GID}`;
    const state = { rows: [], filtered: [] };

    function parseCSV(text){ const rows=[]; let row=[], value='', inQuotes=false; for(let i=0;i<text.length;i++){ const char=text[i], next=text[i+1]; if(inQuotes){ if(char==='"'&&next==='"'){ value+='"'; i++; } else if(char==='"'){ inQuotes=false; } else { value+=char; } } else { if(char==='"'){ inQuotes=true; } else if(char===','){ row.push(value); value=''; } else if(char==='\n'){ row.push(value); rows.push(row); row=[]; value=''; } else if(char==='\r'){} else { value+=char; } } } row.push(value); rows.push(row); return rows.filter(r=>r.some(cell=>String(cell||'').trim()!=='')); }
    function normalizeHeader(h){ return String(h||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim(); }
    function slugify(v){ return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
    function mapRows(matrix){ const [headers,...data]=matrix; const index={}; headers.forEach((h,i)=>index[normalizeHeader(h)]=i); const pick=(obj,...keys)=>{ for(const key of keys){ if(index[key]!=null) return obj[index[key]]||''; } return ''; }; return data.map(cols=>({ id:pick(cols,'id'), site:pick(cols,'site'), title:pick(cols,'nom du jeu'), version:pick(cols,'version'), tradVersion:pick(cols,'trad ver'), link:pick(cols,'lien trad'), status:pick(cols,'statut'), tags:pick(cols,'tags'), engine:pick(cols,'type'), translator:pick(cols,'traducteur'), reviewer:pick(cols,'relecteur'), translationType:pick(cols,'type de traduction') })).filter(r=>r.title||r.id||r.link); }
    function makeAbsoluteLink(value){ const v=String(value||'').trim(); if(!v) return ''; if(/^https?:\/\//i.test(v)) return v; if(/^\/\//.test(v)) return 'https:'+v; if(/^f95/i.test(v)) return 'https://'+v; return v; }
    function translationLinkHTML(value){ const url=makeAbsoluteLink(value); if(!url) return '<span class="muted">—</span>'; return `<a class="pill-link" href="${escapeHtml(url)}" target="_blank" rel="noopener">🔗 Traduction</a>`; }
    function escapeHtml(v){ return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function getStatusClass(status){ const s=slugify(status); if(s.includes('en-cours')) return 'status-en-cours'; if(s.includes('termine')) return 'status-termine'; if(s.includes('abandonne')) return 'status-abandonne'; return 'status-other'; }
    function getTranslationTypeClass(value){ const s=slugify(value); if(s.includes('humaine')) return 'trad-humaine'; if(s.includes('semi-automatique')) return 'trad-semi'; if(s.includes('automatique')) return 'trad-auto'; return 'status-other'; }
    function uniqueValues(key){ return [...new Set(state.rows.map(r=>String(r[key]||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'})); }
    function fillSelect(selectId, values, emptyLabel){ const select=document.getElementById(selectId); const current=select.value; select.innerHTML=`<option value="">${emptyLabel}</option>`; values.forEach(v=>{ const opt=document.createElement('option'); opt.value=v; opt.textContent=v; select.appendChild(opt); }); if(values.includes(current)) select.value=current; }
    function renderStats(rows){ const stats=document.getElementById('stats'); const total=rows.length; const enCours=rows.filter(r=>slugify(r.status).includes('en-cours')).length; const termine=rows.filter(r=>slugify(r.status).includes('termine')).length; const abandonne=rows.filter(r=>slugify(r.status).includes('abandonne')).length; const traducteurs=new Set(rows.map(r=>(r.translator||'').trim()).filter(Boolean)).size;
      stats.innerHTML = [
        ['Total jeux', total, null],
        ['En cours', enCours, null],
        ['Terminés', termine, null],
        ['Abandonnés', abandonne, null],
        ['Traducteurs', traducteurs, './traducteurs/']
      ].map(([label,value,href]) => href
        ? `<a class="stat clickable" href="${href}"><div class="label">${label}</div><div class="value">${value}</div><div class="hint">Ouvrir la page dédiée</div></a>`
        : `<div class="stat"><div class="label">${label}</div><div class="value">${value}</div></div>`
      ).join('');
    }
    function applyFilters(){ const q=document.getElementById('searchInput').value.trim().toLowerCase(); const status=document.getElementById('statusFilter').value; const translator=document.getElementById('translatorFilter').value; const engine=document.getElementById('engineFilter').value; const translationType=document.getElementById('translationTypeFilter').value; const sort=document.getElementById('sortSelect').value; let rows=state.rows.filter(r=>{ const hay=[r.id,r.site,r.title,r.version,r.tradVersion,r.status,r.tags,r.engine,r.translator,r.reviewer,r.translationType].join(' ').toLowerCase(); if(q&&!hay.includes(q)) return false; if(status&&r.status!==status) return false; if(translator&&r.translator!==translator) return false; if(engine&&r.engine!==engine) return false; if(translationType&&r.translationType!==translationType) return false; return true; }); rows.sort((a,b)=>{ switch(sort){ case 'title-desc': return String(b.title).localeCompare(String(a.title),'fr',{sensitivity:'base'}); case 'id-asc': return Number(a.id||0)-Number(b.id||0); case 'id-desc': return Number(b.id||0)-Number(a.id||0); case 'translator-asc': return String(a.translator).localeCompare(String(b.translator),'fr',{sensitivity:'base'}); case 'status-asc': return String(a.status).localeCompare(String(b.status),'fr',{sensitivity:'base'}); default: return String(a.title).localeCompare(String(b.title),'fr',{sensitivity:'base'}); } }); state.filtered=rows; renderTable(rows); document.getElementById('footerNote').textContent=`${rows.length} jeu(x) affiché(s) · Source : Google Sheets`; }
    function renderTable(rows){ const tbody=document.getElementById('tableBody'); if(!rows.length){ tbody.innerHTML='<tr><td colspan="12" class="empty">Aucun résultat avec les filtres actuels.</td></tr>'; return; } tbody.innerHTML=rows.map(r=>`<tr><td>${escapeHtml(r.id)||'<span class="muted">—</span>'}</td><td><span class="site-badge">${escapeHtml(r.site||'—')}</span></td><td>${r.title?`<a href="${escapeHtml(SHEET_PAGE_URL)}" target="_blank" rel="noopener">${escapeHtml(r.title)}</a>`:'<span class="muted">—</span>'}</td><td>${escapeHtml(r.version)||'<span class="muted">—</span>'}</td><td>${escapeHtml(r.tradVersion)||'<span class="muted">—</span>'}</td><td>${translationLinkHTML(r.link)}</td><td><span class="status-badge ${getStatusClass(r.status)}">${escapeHtml(r.status||'—')}</span></td><td>${escapeHtml(r.tags)||'<span class="muted">—</span>'}</td><td><span class="type-badge">${escapeHtml(r.engine||'—')}</span></td><td>${escapeHtml(r.translator)||'<span class="muted">—</span>'}</td><td>${escapeHtml(r.reviewer)||'<span class="muted">—</span>'}</td><td><span class="tradtype-badge ${getTranslationTypeClass(r.translationType)}">${escapeHtml(r.translationType||'—')}</span></td></tr>`).join(''); }
    function renderError(message){ document.getElementById('tableBody').innerHTML=`<tr><td colspan="12" class="error">${escapeHtml(message)}<br><br><a href="${escapeHtml(SHEET_PAGE_URL)}" target="_blank" rel="noopener">Ouvrir le tableur</a></td></tr>`; document.getElementById('footerNote').textContent='Impossible de lire le tableur automatiquement pour le moment.'; }
    async function loadSheet(){ document.getElementById('tableBody').innerHTML='<tr><td colspan="12" class="empty">Chargement du tableur...</td></tr>'; try{ const response=await fetch(CSV_URL,{cache:'no-store'}); if(!response.ok) throw new Error(`HTTP ${response.status}`); const csv=await response.text(); const matrix=parseCSV(csv); const rows=mapRows(matrix); if(!rows.length) throw new Error('Aucune ligne exploitable trouvée dans le tableur.'); state.rows=rows; fillSelect('statusFilter', uniqueValues('status'), 'Tous les statuts'); fillSelect('translatorFilter', uniqueValues('translator'), 'Tous les traducteurs'); fillSelect('engineFilter', uniqueValues('engine'), 'Tous les types'); fillSelect('translationTypeFilter', uniqueValues('translationType'), 'Tous les types de traduction'); renderStats(rows); applyFilters(); }catch(err){ console.error(err); renderStats([]); renderError('Le tableur n\'a pas pu être chargé. Vérifie que le Google Sheets est bien accessible publiquement en export CSV.'); } }
    document.getElementById('refreshBtn').addEventListener('click', loadSheet);
    ['searchInput','statusFilter','translatorFilter','engineFilter','translationTypeFilter','sortSelect'].forEach(id => document.getElementById(id).addEventListener(id === 'searchInput' ? 'input' : 'change', applyFilters));
    loadSheet();
  </script>
</body>
</html>
