<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer">
  <title>f95list FR — Traducteurs</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    :root{--bg:#0e1117;--panel:#161b22;--panel-2:#11161d;--text:#e6edf3;--muted:#9aa4af;--border:#30363d;--accent:#58a6ff;--shadow:0 14px 40px rgba(0,0,0,.35)}
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif} a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
    .page{padding:16px 18px 24px}.hero,.panel{background:var(--panel);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow)}
    .hero{padding:22px;margin-bottom:18px;background:linear-gradient(180deg, rgba(88,166,255,.12), rgba(88,166,255,.03))}.hero-top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    h1{margin:0;font-size:30px}.subtitle{margin-top:10px;color:var(--muted)}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:600}
    .toolbar{padding:14px;border-bottom:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:minmax(240px,1.4fr) minmax(180px,.8fr) minmax(180px,.8fr) minmax(180px,.8fr);gap:10px}.toolbar input,.toolbar select{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:11px 12px}
    .table-scroll{overflow:auto;max-height:calc(100vh - 250px)} table{width:100%;border-collapse:collapse;min-width:900px} th,td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;font-size:14px;vertical-align:top} thead th{position:sticky;top:0;background:#1c2128;z-index:2;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    tbody tr:hover{background:rgba(255,255,255,.03)} .muted{color:var(--muted)} .footer-note{color:var(--muted);font-size:13px;padding:14px 4px 0}
    @media (max-width:900px){.toolbar{grid-template-columns:1fr 1fr}.page{padding:14px}} @media (max-width:600px){.toolbar{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <section class="hero"><div class="hero-top"><div><h1>👥 Traducteurs / Relecteurs</h1><div class="subtitle">Lecture dédiée de l’onglet Google Sheets des traducteurs.</div></div><div class="actions"><a class="btn" href="../">← Retour f95fr</a><a class="btn" href="https://docs.google.com/spreadsheets/d/1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs/edit?pli=1&gid=1040172739#gid=1040172739" target="_blank" rel="noopener">Ouvrir le tableur</a><button class="btn" id="refreshBtn" type="button">Rafraîchir</button></div></div></section>
    <section class="panel">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Rechercher un nom, une page, un ID Discord...">
        <select id="pagesFilter"><option value="">Toutes les pages</option></select>
        <select id="sortSelect"><option value="calc-desc">Calc ↓</option><option value="calc-asc">Calc ↑</option><option value="traduction-desc">Traduction ↓</option><option value="nom-asc">Nom A → Z</option></select>
        <select id="roleFilter"><option value="">Tous</option><option value="trad">A de la traduction</option><option value="relecture">A de la relecture</option></select>
      </div>
      <div class="table-scroll"><table><thead><tr><th>Nom</th><th>Pages</th><th>ID Discord</th><th>Traduction</th><th>Relecture</th><th>Calc</th></tr></thead><tbody id="tableBody"><tr><td colspan="6" class="muted">Chargement...</td></tr></tbody></table></div>
    </section>
    <div class="footer-note" id="footerNote"></div>
  </div>
<script>
const SHEET_ID='1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs', GID='1040172739', CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`; const state={rows:[]};
function parseCSV(text){const rows=[];let row=[],value='',inQuotes=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(inQuotes){if(c==='"'&&n==='"'){value+='"';i++;}else if(c==='"'){inQuotes=false;}else value+=c;}else{if(c==='"')inQuotes=true;else if(c===','){row.push(value);value='';}else if(c==='\n'){row.push(value);rows.push(row);row=[];value='';}else if(c==='\r'){}else value+=c;}}row.push(value);rows.push(row);return rows.filter(r=>r.some(x=>String(x||'').trim()!==''));}
function nh(h){return String(h||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();}
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function num(v){const n=Number(String(v||'').replace(',', '.'));return Number.isFinite(n)?n:0;}
function mapRows(matrix){const [headers,...data]=matrix;const idx={};headers.forEach((h,i)=>idx[nh(h)]=i);const pick=(r,...keys)=>{for(const k of keys){if(idx[k]!=null)return r[idx[k]]||'';}return '';};return data.map(r=>({nom:pick(r,'nom'), pages:pick(r,'pages'), discordId:pick(r,'id discord'), traduction:pick(r,'traduction'), relecture:pick(r,'relecture'), calc:pick(r,'calc')})).filter(r=>r.nom||r.discordId);}
function fillPages(){const values=[...new Set(state.rows.map(r=>String(r.pages||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}));const s=document.getElementById('pagesFilter');const cur=s.value;s.innerHTML='<option value="">Toutes les pages</option>';values.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});if(values.includes(cur))s.value=cur;}
function render(rows){const body=document.getElementById('tableBody');if(!rows.length){body.innerHTML='<tr><td colspan="6" class="muted">Aucun résultat.</td></tr>';return;}body.innerHTML=rows.map(r=>`<tr><td>${esc(r.nom)||'—'}</td><td>${r.pages?(/^https?:/i.test(r.pages)||r.pages.includes('F95')||r.pages.includes('Discord')?`<a href="${esc(r.pages.startsWith('http')?r.pages:'#')}" ${r.pages.startsWith('http')?'target="_blank" rel="noopener"':''}>${esc(r.pages)}</a>`:esc(r.pages)): '—'}</td><td>${esc(r.discordId)||'—'}</td><td>${esc(r.traduction)||'0'}</td><td>${esc(r.relecture)||'0'}</td><td>${esc(r.calc)||'0'}</td></tr>`).join('');document.getElementById('footerNote').textContent=`${rows.length} ligne(s) affichée(s) · Source : Google Sheets`;}
function applyFilters(){const q=document.getElementById('searchInput').value.trim().toLowerCase();const pages=document.getElementById('pagesFilter').value;const role=document.getElementById('roleFilter').value;const sort=document.getElementById('sortSelect').value;let rows=state.rows.filter(r=>{const hay=[r.nom,r.pages,r.discordId,r.traduction,r.relecture,r.calc].join(' ').toLowerCase();if(q&&!hay.includes(q))return false;if(pages&&r.pages!==pages)return false;if(role==='trad'&&num(r.traduction)<=0)return false;if(role==='relecture'&&num(r.relecture)<=0)return false;return true;});rows.sort((a,b)=>{switch(sort){case 'calc-asc': return num(a.calc)-num(b.calc);case 'traduction-desc': return num(b.traduction)-num(a.traduction);case 'nom-asc': return String(a.nom).localeCompare(String(b.nom),'fr',{sensitivity:'base'});default:return num(b.calc)-num(a.calc);}});render(rows);}
async function load(){document.getElementById('tableBody').innerHTML='<tr><td colspan="6" class="muted">Chargement...</td></tr>';try{const res=await fetch(CSV_URL,{cache:'no-store'});if(!res.ok)throw new Error(res.status);const txt=await res.text();state.rows=mapRows(parseCSV(txt));fillPages();applyFilters();}catch(e){document.getElementById('tableBody').innerHTML='<tr><td colspan="6" class="muted">Impossible de charger cet onglet.</td></tr>';}}
['searchInput','pagesFilter','sortSelect','roleFilter'].forEach(id=>document.getElementById(id).addEventListener(id==='searchInput'?'input':'change',applyFilters));document.getElementById('refreshBtn').addEventListener('click',load);load();
</script>
</body></html>
