<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer">
  <title>f95list FR — Traducteurs</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    :root{
      --bg:#0b1220;--panel:#111827;--panel-2:#0f172a;--text:#e6edf3;--muted:#9aa4af;
      --border:#263244;--accent:#58a6ff;--shadow:0 14px 40px rgba(0,0,0,.35)
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%;overflow:hidden;background:linear-gradient(180deg,#07101d 0%,#0b1220 55%,#09111e 100%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
    .page{padding:10px 12px 12px;height:100vh;display:flex;flex-direction:column;gap:10px}
    .hero,.panel,.summary-card{background:rgba(17,24,39,.92);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow)} .panel{display:flex;flex-direction:column;flex:1;min-height:0}
    .hero{padding:14px 16px;margin-bottom:0;background:linear-gradient(135deg, rgba(96,165,250,.18), rgba(17,24,39,.96) 55%, rgba(34,197,94,.08))}
    .hero-top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    h1{margin:0;font-size:24px}
    .subtitle{margin-top:6px;color:var(--muted);font-size:14px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:8px 12px;border-radius:12px;cursor:pointer;font-weight:600}
    .toolbar{padding:8px;border-bottom:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:minmax(240px,1.4fr) minmax(180px,.8fr) minmax(180px,.8fr) minmax(180px,.8fr);gap:8px}
    .toolbar input,.toolbar select{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:9px 11px}
    .summary-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:8px;padding:8px}
    .summary-card{border-radius:16px;padding:8px 10px}
    .summary-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .summary-value{margin-top:4px;font-size:24px;font-weight:800;line-height:1}
    .summary-sub{margin-top:4px;color:var(--muted);font-size:12px}
    .table-scroll{overflow:auto;flex:1;min-height:0;max-height:none}
    table{width:100%;border-collapse:collapse;min-width:980px}
    th,td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;font-size:14px;vertical-align:top}
    thead th{position:sticky;top:0;background:#1c2128;z-index:2;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    tbody tr:hover{background:rgba(255,255,255,.03)}
    .muted{color:var(--muted)}
    .footer-note{color:var(--muted);font-size:12px;padding:2px 4px 0}
    .pages-badges{display:flex;flex-wrap:wrap;gap:6px}
    .page-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.08);white-space:nowrap;font-weight:700;font-size:12px}
    .badge-f95{background:rgba(31,111,235,.22)}
    .badge-discord{background:rgba(88,101,242,.22)}
    .badge-lewd{background:rgba(234,88,12,.18)}
    .badge-other{background:rgba(148,163,184,.18)}
    .num{font-variant-numeric:tabular-nums}
    @media (max-width:1300px){.summary-grid{grid-template-columns:repeat(3,minmax(140px,1fr))}}
    @media (max-width:900px){.toolbar{grid-template-columns:1fr 1fr}.summary-grid{grid-template-columns:repeat(2,minmax(140px,1fr))}.page{padding:14px}}
    @media (max-width:600px){.toolbar,.summary-grid{grid-template-columns:1fr}}
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <div class="page">
    <section class="hero"><div class="hero-top"><div><h1>👥 Traducteurs / Relecteurs</h1><div class="subtitle">Lecture dédiée de l’onglet Google Sheets des traducteurs.</div></div><div class="actions"><a class="btn" href="../">← Retour f95fr</a><a class="btn" href="https://docs.google.com/spreadsheets/d/1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs/edit?pli=1&gid=1040172739#gid=1040172739" target="_blank" rel="noopener">Ouvrir le tableur</a><button class="btn" id="refreshBtn" type="button">Rafraîchir</button></div></div></section>
    <section class="panel">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Rechercher un nom, une page, un ID Discord...">
        <select id="pagesFilter"><option value="">Toutes les pages</option></select>
        <select id="sortSelect"><option value="calc-desc">Calc ↓</option><option value="calc-asc">Calc ↑</option><option value="traduction-desc">Traduction ↓</option><option value="nom-asc">Nom A → Z</option></select>
        <select id="roleFilter"><option value="">Tous</option><option value="trad">A de la traduction</option><option value="relecture">A de la relecture</option></select>
      </div>
      <div class="summary-grid" id="summaryGrid">
        <div class="summary-card"><div class="summary-label">Chargement</div><div class="summary-value">…</div><div class="summary-sub">des traducteurs</div></div>
      </div>
      <div class="table-scroll"><table><thead><tr><th>Nom</th><th>Pages</th><th>ID Discord</th><th>Traduction</th><th>Relecture</th><th>Calc</th></tr></thead><tbody id="tableBody"><tr><td colspan="6" class="muted">Chargement...</td></tr></tbody></table></div>
    </section>
    <div class="footer-note" id="footerNote"></div>
  </div>
<script>
const SHEET_ID='1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs';
const GID='1040172739';
const XLSX_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=xlsx`;
const state={rows:[]};

function parseCSV(text){
  const rows=[]; let row=[], value='', inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(inQuotes){
      if(c==='"' && n==='"'){ value+='"'; i++; }
      else if(c==='"'){ inQuotes=false; }
      else value+=c;
    }else{
      if(c==='"') inQuotes=true;
      else if(c===','){ row.push(value); value=''; }
      else if(c==='\n'){ row.push(value); rows.push(row); row=[]; value=''; }
      else if(c==='\r'){}
      else value+=c;
    }
  }
  row.push(value); rows.push(row);
  return rows.filter(r=>r.some(x=>String(x||'').trim()!=='')); 
}
function nh(h){ return String(h||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim(); }
function esc(v){ return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function num(v){ const n=Number(String(v||'').replace(',', '.')); return Number.isFinite(n)?n:0; }

function normalizeLabel(label){
  return String(label||'').toLowerCase().replace(/\s+/g,' ').trim();
}
function splitPageLabels(pages){
  return String(pages||'').split(/\s*-\s*/).map(x=>x.trim()).filter(Boolean);
}
function badgeClass(label){
  const s = normalizeLabel(label);
  if(s.includes('discord')) return 'badge-discord';
  if(s.includes('lewd')) return 'badge-lewd';
  if(s.includes('f95')) return 'badge-f95';
  return 'badge-other';
}
function rowKey(nom, discordId){
  return `${String(nom||'').trim()}|${String(discordId||'').trim()}`.toLowerCase();
}
function decodeRangeAddress(range){
  if(!range || !range.s || !range.e) return [];
  const out = [];
  for(let c = range.s.c; c <= range.e.c; c++) out.push(c);
  return out;
}
function getCellDisplayValue(sheet, addr){
  const cell = sheet[addr];
  if(!cell) return '';
  if(cell.w != null && cell.w !== '') return String(cell.w);
  if(cell.v != null) return String(cell.v);
  return '';
}
function getCellLink(sheet, addr){
  const cell = sheet[addr];
  if(cell && cell.l && cell.l.Target) return String(cell.l.Target);
  return '';
}
function findHeaderInfo(sheet){
  const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1:A1');
  const wanted = ['nom','pages','id discord','traduction','relecture','calc'];

  for(let r = range.s.r; r <= Math.min(range.e.r, range.s.r + 25); r++){
    const headers = decodeRangeAddress(range).map(c => nh(getCellDisplayValue(sheet, XLSX.utils.encode_cell({r, c}))));
    const score = wanted.filter(k => headers.includes(k)).length;
    if(score >= 4){
      const idx = {};
      headers.forEach((h, i) => idx[h] = i);
      return { range, headerRow: r, idx };
    }
  }
  return null;
}
function findBestSheet(workbook){
  const exact = workbook.Sheets['Traducteurs/Relecteurs'];
  if(exact) return exact;
  let bestName = null;
  let bestScore = -1;
  for(const name of workbook.SheetNames){
    const sheet = workbook.Sheets[name];
    const info = findHeaderInfo(sheet);
    if(!info) continue;
    const headers = Object.keys(info.idx);
    const score = ['nom','pages','id discord','traduction','relecture','calc'].filter(k => headers.includes(k)).length;
    if(score > bestScore){
      bestScore = score;
      bestName = name;
    }
  }
  return bestName ? workbook.Sheets[bestName] : workbook.Sheets[workbook.SheetNames[0]];
}
function mapRowsFromSheet(sheet){
  const info = findHeaderInfo(sheet);
  if(!info) return [];
  const { range, headerRow, idx } = info;

  const getIndex = (...keys) => {
    for(const k of keys){ if(idx[k] != null) return idx[k]; }
    return -1;
  };

  const colNom = getIndex('nom');
  const colPages = getIndex('pages');
  const colDiscord = getIndex('id discord');
  const colTraduction = getIndex('traduction');
  const colRelecture = getIndex('relecture');
  const colCalc = getIndex('calc');

  const rows = [];
  for(let r = headerRow + 1; r <= range.e.r; r++){
    const read = (col) => col >= 0 ? getCellDisplayValue(sheet, XLSX.utils.encode_cell({r, c: col})) : '';
    const readLink = (col) => col >= 0 ? getCellLink(sheet, XLSX.utils.encode_cell({r, c: col})) : '';

    const nom = read(colNom).trim();
    const discordId = read(colDiscord).trim();
    const traduction = read(colTraduction).trim();
    const relecture = read(colRelecture).trim();
    const calc = read(colCalc).trim();

    if(!nom && !discordId && !traduction && !relecture && !calc) continue;

    const rawPages = read(colPages).trim();
    const pageLinks = [];
    const pageLabels = splitPageLabels(rawPages);
    const pagesCellLink = readLink(colPages);

    if(pageLabels.length && pagesCellLink){
      if(pageLabels.length === 1){
        pageLinks.push({ label: pageLabels[0], href: pagesCellLink });
      } else {
        pageLabels.forEach(label => pageLinks.push({ label, href: pagesCellLink }));
      }
    }

    rows.push({
      nom,
      nomUrl: readLink(colNom),
      pages: rawPages,
      discordId,
      traduction,
      relecture,
      calc,
      pageLinks
    });
  }
  return rows;
}

function fallbackUrl(label){
  const s = normalizeLabel(label);
  if(s.includes('discord')) return 'https://discord.gg/';
  if(s.includes('lewdcorner') || s.includes('lewd')) return 'https://lewdcorner.com/';
  if(s.includes('f95zone') || s.includes('f95')) return 'https://f95zone.to/';
  return '';
}

function buildPagesHtml(row){
  const labels = splitPageLabels(row.pages);
  if(!labels.length) return '—';

  const links = Array.isArray(row.pageLinks) ? [...row.pageLinks] : [];
  const hasSingleDetectedLink = labels.length === 1 && links.length === 1 && links[0].href;

  const badges = labels.map((label) => {
    const cls = badgeClass(label);
    let href = '';
    let title = label;

    if(hasSingleDetectedLink){
      href = links[0].href || '';
      title = `${label} · lien détecté`;
    } else {
      href = fallbackUrl(label);
      title = `${label} · lien de secours`;
    }

    if(href){
      return `<a class="page-badge ${cls}" href="${esc(href)}" target="_blank" rel="noopener" title="${esc(title)}">${esc(label)}</a>`;
    }
    return `<span class="page-badge ${cls}" title="${esc(title)}">${esc(label)}</span>`;
  });

  return `<div class="pages-badges">${badges.join('')}</div>`;
}



function fillPages(){
  const values=[...new Set(state.rows.map(r=>String(r.pages||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}));
  const s=document.getElementById('pagesFilter');
  const cur=s.value;
  s.innerHTML='<option value="">Toutes les pages</option>';
  values.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});
  if(values.includes(cur)) s.value=cur;
}

function buildSummary(rows){
  const totalTrad = rows.reduce((s,r)=>s+num(r.traduction),0);
  const totalRel = rows.reduce((s,r)=>s+num(r.relecture),0);
  const totalCalc = rows.reduce((s,r)=>s+num(r.calc),0);
  const withDiscord = rows.filter(r=>String(r.discordId||'').trim()).length;
  const withPageLinks = rows.filter(r=>((splitPageLabels(r.pages).length === 1 && Array.isArray(r.pageLinks) && r.pageLinks.length === 1 && String(r.pageLinks[0]?.href||'').trim()) || String(r.nomUrl||'').trim())).length;

  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card"><div class="summary-label">Traducteurs visibles</div><div class="summary-value">${rows.length}</div><div class="summary-sub">lignes affichées</div></div>
    <div class="summary-card"><div class="summary-label">Traduction</div><div class="summary-value">${totalTrad}</div><div class="summary-sub">cumul traduction</div></div>
    <div class="summary-card"><div class="summary-label">Relecture</div><div class="summary-value">${totalRel}</div><div class="summary-sub">cumul relecture</div></div>
    <div class="summary-card"><div class="summary-label">Calc</div><div class="summary-value">${totalCalc}</div><div class="summary-sub">total combiné</div></div>
    <div class="summary-card"><div class="summary-label">Liens détectés</div><div class="summary-value">${withPageLinks}</div><div class="summary-sub">sinon lien de secours</div></div>
  `;
}

function render(rows){
  const body=document.getElementById('tableBody');
  if(!rows.length){
    body.innerHTML='<tr><td colspan="6" class="muted">Aucun résultat.</td></tr>';
    buildSummary([]);
    return;
  }
  body.innerHTML=rows.map(r=>`<tr>
    <td>${r.nom ? (r.nomUrl ? `<a href="${esc(r.nomUrl)}" target="_blank" rel="noopener">${esc(r.nom)}</a>` : esc(r.nom)) : '—'}</td>
    <td>${buildPagesHtml(r)}</td>
    <td class="num">${esc(r.discordId)||'—'}</td>
    <td class="num">${esc(r.traduction)||'0'}</td>
    <td class="num">${esc(r.relecture)||'0'}</td>
    <td class="num"><strong>${esc(r.calc)||'0'}</strong></td>
  </tr>`).join('');
  buildSummary(rows);
  document.getElementById('footerNote').textContent=`${rows.length} ligne(s) affichée(s) · Source : Google Sheets`;
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const pages=document.getElementById('pagesFilter').value;
  const role=document.getElementById('roleFilter').value;
  const sort=document.getElementById('sortSelect').value;

  let rows=state.rows.filter(r=>{
    const hay=[r.nom,r.pages,r.discordId,r.traduction,r.relecture,r.calc].join(' ').toLowerCase();
    if(q && !hay.includes(q)) return false;
    if(pages && r.pages!==pages) return false;
    if(role==='trad' && num(r.traduction)<=0) return false;
    if(role==='relecture' && num(r.relecture)<=0) return false;
    return true;
  });

  rows.sort((a,b)=>{
    switch(sort){
      case 'calc-asc': return num(a.calc)-num(b.calc);
      case 'traduction-desc': return num(b.traduction)-num(a.traduction);
      case 'nom-asc': return String(a.nom).localeCompare(String(b.nom),'fr',{sensitivity:'base'});
      default: return num(b.calc)-num(a.calc);
    }
  });

  render(rows);
}

async function load(){
  document.getElementById('tableBody').innerHTML='<tr><td colspan="6" class="muted">Chargement...</td></tr>';
  try{
    const res = await fetch(XLSX_URL,{cache:'no-store'});
    if(!res.ok) throw new Error(res.status);
    const buffer = await res.arrayBuffer();
    const wb = XLSX.read(buffer, {type:'array'});
    const sheet = findBestSheet(wb);
    if(!sheet) throw new Error('sheet not found');
    state.rows = mapRowsFromSheet(sheet);
    fillPages();
    applyFilters();
  }catch(e){
    document.getElementById('tableBody').innerHTML='<tr><td colspan="6" class="muted">Impossible de charger cet onglet.</td></tr>';
  }
}

['searchInput','pagesFilter','sortSelect','roleFilter'].forEach(id=>{
  document.getElementById(id).addEventListener(id==='searchInput'?'input':'change',applyFilters);
});
document.getElementById('refreshBtn').addEventListener('click',load);
load();
</script>
</body></html>
